title: Template
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              display: 'Navn'
              instructions: 'Navnet du ser i vælgeren.'
              validate:
                - required
          -
            handle: preview_image
            field:
              type: assets
              container: assets
              folder: saved-templates
              max_files: 1
              display: 'Preview'
              visibility: read_only
          # The sections themselves, in a real page-builder field rather than
          # stored JSON — that's what makes them render with full augmentation
          # (bard, assets, `style_push`) when the preview image is screenshotted.
          - import: PAGE_BUILDER_FIELD
